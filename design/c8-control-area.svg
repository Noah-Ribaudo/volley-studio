<svg width="360" height="264" viewBox="0 0 360 264" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shell" x1="180" y1="8" x2="180" y2="252" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAFBFC"/>
      <stop offset="1" stop-color="#E7EDF2"/>
    </linearGradient>
    <linearGradient id="panel" x1="180" y1="54" x2="180" y2="230" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBFCFD"/>
      <stop offset="1" stop-color="#EDF2F6"/>
    </linearGradient>
    <linearGradient id="tileActive" x1="106" y1="90" x2="106" y2="148" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E4ECF2"/>
    </linearGradient>
    <linearGradient id="tile" x1="254" y1="90" x2="254" y2="148" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#ECF1F5" stop-opacity="0.96"/>
    </linearGradient>
    <radialGradient id="joystickRing" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(180 150) rotate(90) scale(34)">
      <stop stop-color="#DDD7CF"/>
      <stop offset="0.6" stop-color="#CFC8BF"/>
      <stop offset="1" stop-color="#B3ABA1"/>
