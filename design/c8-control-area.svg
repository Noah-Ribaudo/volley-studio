      <g id="rotation-R2"><rect x="74.8" y="24" width="42" height="18" rx="6" fill="rgba(255,255,255,0.52)" stroke="rgba(163,163,163,0.22)"/><text x="95.8" y="35.4" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="7.5" font-weight="600" fill="#8D887F">R2</text></g>
