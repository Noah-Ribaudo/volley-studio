          <rect x="29" y="129.50" width="10" height="3.6" rx="1.8" fill="rgba(249,146,43,0.98)" transform="rotate(-90 34 131.30)"/>
          <rect x="29" y="113.85" width="10" height="3.6" rx="1.8" fill="rgba(249,146,43,0.98)" transform="rotate(-90 34 115.65)"/>
