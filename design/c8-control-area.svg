    </filter>
    <filter id="shadow-sm" x="0" y="0" width="360" height="264" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#94A3B8" flood-opacity="0.12"/>
    </filter>
