        <text x="246" y="123" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#44515F">Defense</text>
        <text x="112" y="189" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#44515F">Receive</text>
        <text x="246" y="189" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#44515F">Attack</text>
